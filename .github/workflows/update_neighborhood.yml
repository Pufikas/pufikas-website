name: Update Neighborhood

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build neighborhood
        run: node src/scripts/utils/similarity.js

      - name: Commit generated graph
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add src/data/neighborhood_sites.json

          git diff --cached --quiet || git commit -m "Build neighborhood graph"

          git push